---
- name: Backup and Update Mailcow Dockerized
  hosts: mailcow
  become: true

  vars:
    mailcow_path: /opt/mailcow-dockerized
    backup_path: /mnt/nas/backups/mailcow
    compose_cmd: "docker compose"

  tasks:

    # ---------------- PRECHECK ----------------

    - name: Ensure Mailcow exists
      stat:
        path: "{{ mailcow_path }}/docker-compose.yml"
      register: mailcow_check

    - name: Fail if Mailcow is missing
      fail:
        msg: "Mailcow not found at {{ mailcow_path }}"
      when: not mailcow_check.stat.exists

    - name: Ensure backup directory exists
      file:
        path: "{{ backup_path }}"
        state: directory
        mode: "0775"

    # ---------------- BACKUP ----------------

    - name: Run Mailcow backup (streamed + logged)
      shell: |
        cd {{ mailcow_path }}

        LOGFILE="/tmp/mailcow-backup-$(date +%F-%H-%M-%S).log"

        echo "===================================="
        echo "Mailcow backup STARTED"
        echo "Log: $LOGFILE"
        echo "===================================="

        stdbuf -oL -eL ./helper-scripts/backup_and_restore.sh backup all 2>&1 | tee "$LOGFILE"

        echo "===================================="
        echo "Mailcow backup FINISHED"
        echo "===================================="
      args:
        executable: /bin/bash
      register: backup_result
      changed_when: true

    - name: Show last backup log lines (debug)
      shell: tail -n 50 /tmp/mailcow-backup-*.log
      register: log_tail

    - debug:
        var: log_tail.stdout_lines

    # ---------------- VERIFY BACKUP ----------------

    - name: Check backup files exist on NAS
      find:
        paths: "{{ backup_path }}"
        file_type: directory
      register: backup_dirs

    - name: Fail if no backups were created
      fail:
        msg: "Backup did not appear on NAS!"
      when: backup_dirs.matched == 0

    # ---------------- UPDATE ----------------

    - name: Pull Mailcow repository updates
      git:
        repo: https://github.com/mailcow/mailcow-dockerized.git
        dest: "{{ mailcow_path }}"
        update: yes
        force: no

    - name: Pull Docker images
      command: "{{ compose_cmd }} pull"
      args:
        chdir: "{{ mailcow_path }}"

    - name: Restart Mailcow containers
      command: "{{ compose_cmd }} up -d"
      args:
        chdir: "{{ mailcow_path }}"

    - name: Cleanup unused Docker resources
      command: docker system prune -f
