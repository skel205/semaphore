---
- name: Mailcow Backup (Bulletproof Non-Interactive)
  hosts: mailcow
  become: true

  vars:
    mailcow_path: /opt/mailcow-dockerized
    backup_log: /tmp/mailcow-backup.log

  tasks:

    - name: Verify Mailcow exists
      stat:
        path: "{{ mailcow_path }}/helper-scripts/backup_and_restore.sh"
      register: mailcow_script

    - name: Fail if missing
      fail:
        msg: "Mailcow backup script not found at {{ mailcow_path }}"
      when: not mailcow_script.stat.exists

    # ---------------- SAFE EXECUTION CORE ----------------

    - name: Run Mailcow backup (fully detached + no TTY issues)
      shell: |
        cd {{ mailcow_path }}

        # Kill any accidental stale backups first (prevents locks/hangs)
        pkill -f backup_and_restore.sh || true

        # Fully isolated execution:
        # - nohup prevents SSH hang
        # - setsid breaks session attachment
        # - stdout redirected so Ansible never blocks
        nohup setsid ./helper-scripts/backup_and_restore.sh backup all \
          > {{ backup_log }} 2>&1 < /dev/null &

        echo "Backup started in background"
      args:
        executable: /bin/bash
      register: backup_start
      changed_when: true

    # ---------------- WAIT FOR COMPLETION ----------------

    - name: Wait for Mailcow backup to finish
      shell: pgrep -f "backup_and_restore.sh" || echo "done"
      register: backup_check
      retries: 180
      delay: 10
      until: "'done' in backup_check.stdout"

    # ---------------- FINAL STATUS ----------------

    - name: Show backup log tail
      shell: tail -n 80 {{ backup_log }} || true
      register: log_tail

    - debug:
        var: log_tail.stdout_lines

    - name: Confirm backup folder exists
      shell: ls -1t /mnt/nas/backups/mailcow | head -n 1
      register: latest_backup

    - debug:
        msg: "Latest backup: {{ latest_backup.stdout }}"
