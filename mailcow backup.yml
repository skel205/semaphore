---
- name: Backup and Update Mailcow Dockerized
  hosts: mailcow
  become: true

  vars:
    mailcow_path: /opt/mailcow-dockerized
    backup_path: /mnt/nas/backups/mailcow
    compose_cmd: "docker compose"

  tasks:

    # ---------------- CHECK ----------------

    - name: Ensure Mailcow exists
      stat:
        path: "{{ mailcow_path }}/docker-compose.yml"
      register: mailcow_check

    - name: Fail if Mailcow is missing
      fail:
        msg: "Mailcow not found at {{ mailcow_path }}"
      when: not mailcow_check.stat.exists

    - name: Ensure backup directory exists
      file:
        path: "{{ backup_path }}"
        state: directory
        mode: "0775"

    # ---------------- BACKUP ----------------

    - name: Run Mailcow backup (working command)
      command: ./helper-scripts/backup_and_restore.sh backup all
      args:
        chdir: "{{ mailcow_path }}"
      register: backup_result
      changed_when: true

    - name: Show backup output (for Semaphore logs)
      debug:
        var: backup_result.stdout_lines

    - name: Verify backup was created on NAS
      find:
        paths: "{{ backup_path }}"
        file_type: directory
      register: backup_files

    - name: Fail if no backups found
      fail:
        msg: "Backup failed or not written to NAS!"
      when: backup_files.matched == 0

    # ---------------- UPDATE ----------------

    - name: Pull latest Mailcow repository updates
      git:
        repo: https://github.com/mailcow/mailcow-dockerized.git
        dest: "{{ mailcow_path }}"
        update: yes
        force: no

    - name: Pull latest Docker images
      command: "{{ compose_cmd }} pull"
      args:
        chdir: "{{ mailcow_path }}"

    - name: Restart Mailcow containers
      command: "{{ compose_cmd }} up -d"
      args:
        chdir: "{{ mailcow_path }}"

    - name: Cleanup unused Docker resources
      command: docker system prune -f
