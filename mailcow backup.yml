---
- name: Mailcow Backup (Instant Success/Failure Detection)
  hosts: mailcow
  become: true

  vars:
    mailcow_path: /opt/mailcow-dockerized
    backup_path: /mnt/nas/backups/mailcow
    log_file: /tmp/mailcow-backup.log

  tasks:

    # ---------------- START BACKUP ----------------

    - name: Start Mailcow backup (detached safe)
      shell: |
        cd {{ mailcow_path }}

        nohup ./helper-scripts/backup_and_restore.sh backup all \
          > {{ log_file }} 2>&1 < /dev/null &

        echo $! > /tmp/mailcow-backup.pid
      args:
        executable: /bin/bash
      register: start_result
      changed_when: true

    # ---------------- WAIT FOR FIRST RESULT ----------------

    - name: Wait for backup folder to appear (FAST FAILURE DETECTION)
      shell: |
        ls -1t {{ backup_path }} | head -n 1
      register: latest_backup
      retries: 120
      delay: 5
      until: latest_backup.stdout != ""

    # ---------------- VALIDATE CONTENT ----------------

    - name: Check backup integrity (required files)
      shell: |
        LATEST=$(ls -1t {{ backup_path }} | head -n 1)

        test -f "{{ backup_path }}/$LATEST/backup_mariadb.tar.zst" &&
        test -f "{{ backup_path }}/$LATEST/backup_vmail.tar.zst" &&
        test -f "{{ backup_path }}/$LATEST/mailcow.conf"

        echo $LATEST
      register: validation
      changed_when: false

    # ---------------- FAIL IF BROKEN ----------------

    - name: Fail if backup is incomplete
      fail:
        msg: "Backup failed or incomplete - missing required files"
      when: validation.rc != 0

    # ---------------- SUCCESS OUTPUT ----------------

    - name: Show successful backup
      debug:
        msg: "Backup SUCCESS: {{ validation.stdout }}"

    # ---------------- OPTIONAL LOG CHECK ----------------

    - name: Check backup log for errors
      shell: grep -i "error\\|fail\\|fatal" {{ log_file }} || true
      register: log_errors
      changed_when: false

    - name: Show warnings if any
      debug:
        var: log_errors.stdout_lines
      when: log_errors.stdout != ""
