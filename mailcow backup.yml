---
- name: Mailcow Backup (Simple & Reliable)
  hosts: mailcow
  become: true

  vars:
    mailcow_path: /opt/mailcow-dockerized

  tasks:

    - name: Check Mailcow exists
      stat:
        path: "{{ mailcow_path }}/helper-scripts/backup_and_restore.sh"
      register: mailcow_script

    - name: Fail if Mailcow missing
      fail:
        msg: "Mailcow backup script not found"
      when: not mailcow_script.stat.exists

    - name: Run Mailcow backup (same as manual working command)
      command: ./helper-scripts/backup_and_restore.sh backup all
      args:
        chdir: "{{ mailcow_path }}"
      register: backup_result
      changed_when: true

    - name: Show backup output
      debug:
        var: backup_result.stdout_lines
