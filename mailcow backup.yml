---
- name: Mailcow Backup (Stable Production Safe)
  hosts: mailcow
  become: true

  vars:
    mailcow_path: /opt/mailcow-dockerized
    backup_log: /tmp/mailcow-backup.log

  tasks:

    - name: Verify Mailcow exists
      stat:
        path: "{{ mailcow_path }}/helper-scripts/backup_and_restore.sh"
      register: mailcow_script

    - name: Fail if missing
      fail:
        msg: "Mailcow backup script not found"
      when: not mailcow_script.stat.exists

    # ---------------- SAFE EXECUTION ----------------

    - name: Run Mailcow backup (safe detached execution)
      shell: |
        cd {{ mailcow_path }}

        # IMPORTANT: only nohup, no setsid, no pkill
        nohup ./helper-scripts/backup_and_restore.sh backup all \
          > {{ backup_log }} 2>&1 < /dev/null &

        echo "Backup started safely"
      args:
        executable: /bin/bash
      register: backup_start
      changed_when: true

    # ---------------- WAIT (SAFE POLLING) ----------------

    - name: Wait for backup to complete
      shell: pgrep -f backup_and_restore.sh || echo done
      register: check
      retries: 180
      delay: 10
      until: "'done' in check.stdout"

    # ---------------- OUTPUT ----------------

    - name: Show backup log
      shell: tail -n 80 {{ backup_log }} || true
      register: log

    - debug:
        var: log.stdout_lines
