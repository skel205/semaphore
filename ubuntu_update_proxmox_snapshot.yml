---
- name: Universal Linux update (bulletproof)
  hosts: ubuntu_vms
  become: true
  gather_facts: true

  vars:
    ansible_ssh_timeout: 120

  tasks:

    # --------------------------------------------
    # Detect package manager (safe + clean)
    # --------------------------------------------
    - name: Detect package manager
      ansible.builtin.raw: |
        if command -v apt-get >/dev/null 2>&1; then echo apt;
        elif command -v apk >/dev/null 2>&1; then echo apk;
        else echo unknown; fi
      register: pkg_mgr
      changed_when: false

    - name: Normalize package manager value
      set_fact:
        pkg: "{{ pkg_mgr.stdout | trim }}"

    - name: Debug package manager
      debug:
        msg: "Detected package manager = {{ pkg }}"

    # --------------------------------------------
    # Fail safely if unsupported
    # --------------------------------------------
    - name: Fail if unsupported OS
      fail:
        msg: "Unsupported OS (no apt or apk detected)"
      when: pkg not in ['apt', 'apk']

    # ============================================
    # DEBIAN / UBUNTU PATH
    # ============================================
    - name: Debian/Ubuntu update block
      when: pkg == "apt"
      block:

        - name: Update apt cache
          apt:
            update_cache: yes

        - name: Upgrade system
          apt:
            upgrade: dist
            autoremove: yes
            purge: yes

    # ============================================
    # ALPINE PATH (FIXED FOR SSH DROP ISSUE)
    # ============================================
    - name: Alpine update block (safe execution)
      when: pkg == "apk"
      block:

        - name: Update Alpine packages
          raw: apk update

        # FIX: prevents SSH drop during long upgrades
        - name: Upgrade Alpine packages (stable)
          raw: |
            nohup sh -c "apk upgrade" >/tmp/apk-upgrade.log 2>&1 &
