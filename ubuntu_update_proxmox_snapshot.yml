---
- name: Universal Linux update (safe)
  hosts: ubuntu_vms
  become: true
  gather_facts: true

  tasks:

    # --------------------------------------------
    # Detect OS type once
    # --------------------------------------------
    - name: Detect package manager
      ansible.builtin.raw: |
        if command -v apt-get >/dev/null 2>&1; then echo apt;
        elif command -v apk >/dev/null 2>&1; then echo apk;
        else echo unknown; fi
      register: pkg_mgr
      changed_when: false

    - name: Set package manager fact
      set_fact:
        pkg: "{{ pkg_mgr.stdout | trim }}"

    # --------------------------------------------
    # Fail safely
    # --------------------------------------------
    - name: Fail if unsupported OS
      fail:
        msg: "Unsupported OS - no apt or apk found"
      when: pkg == "unknown"

    # --------------------------------------------
    # Debian / Ubuntu ONLY
    # --------------------------------------------
    - name: Update Debian/Ubuntu systems
      when: pkg == "apt"
      apt:
        update_cache: yes
        upgrade: dist
        autoremove: yes
        purge: yes

    # --------------------------------------------
    # Alpine ONLY
    # --------------------------------------------
    - name: Update Alpine systems
      when: pkg == "apk"
      raw: |
        apk update
        apk upgrade
