---
- name: Universal Linux update (bulletproof)
  hosts: ubuntu_vms
  become: true
  gather_facts: true

  tasks:

    # --------------------------------------------
    # Detect package manager (clean output)
    # --------------------------------------------
    - name: Detect package manager
      ansible.builtin.raw: |
        if command -v apt-get >/dev/null 2>&1; then echo apt;
        elif command -v apk >/dev/null 2>&1; then echo apk;
        else echo unknown; fi
      register: pkg_mgr
      changed_when: false

    - name: Normalize package manager value
      set_fact:
        pkg: "{{ pkg_mgr.stdout | trim }}"

    - name: Debug package manager (safe)
      debug:
        msg: "Detected package manager = {{ pkg }}"

    # --------------------------------------------
    # Fail safely
    # --------------------------------------------
    - name: Fail if unsupported OS
      fail:
        msg: "Unsupported OS (no apt or apk detected)"
      when: pkg != "apt" and pkg != "apk"

    # --------------------------------------------
    # Debian / Ubuntu ONLY
    # --------------------------------------------
    - name: Debian/Ubuntu update
      when: pkg == "apt"
      block:
        - name: Update apt cache
          apt:
            update_cache: yes

        - name: Upgrade system
          apt:
            upgrade: dist
            autoremove: yes
            purge: yes

    # --------------------------------------------
    # Alpine ONLY (safe execution block)
    # --------------------------------------------
    - name: Alpine update
      when: pkg == "apk"
      block:
        - name: Update Alpine packages
          raw: apk update

        - name: Upgrade Alpine packages
          raw: apk upgrade
