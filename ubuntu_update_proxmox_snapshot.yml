---
# ====================================================
# PROXMOX SNAPSHOT TASKS
# ====================================================
- name: Create Proxmox snapshot + retention
  hosts: proxmox
  become: true

  vars:
    vmid: 125
    keep_snapshots: 5
    snapshot_prefix: "pre-update"

  tasks:

    - name: Create snapshot
      command: >
        qm snapshot {{ vmid }}
        {{ snapshot_prefix }}-{{ ansible_date_time.date }}-{{ ansible_date_time.time | replace(':','-') }}

    - name: Get snapshots
      command: qm listsnapshot {{ vmid }}
      register: snap_list

    - name: Parse snapshots
      set_fact:
        snapshots: >-
          {{
            snap_list.stdout_lines
            | select('match', '^[a-zA-Z0-9]')
            | map('regex_replace', '\s+.*$', '')
            | reject('equalto', 'current')
            | list
          }}

    - name: Delete old snapshots
      command: qm delsnapshot {{ vmid }} {{ item }}
      loop: "{{ snapshots[:-keep_snapshots] if snapshots|length > keep_snapshots else [] }}"


# ====================================================
# UBUNTU UPDATE TASKS
# ====================================================
- name: Update Ubuntu VMs
  hosts: ubuntu_vms
  become: true

  tasks:

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Upgrade system
      apt:
        upgrade: dist

    - name: Cleanup
      apt:
        autoremove: yes
        purge: yes
