---
- name: Universal Linux update (production safe)
  hosts: ubuntu_vms
  become: true
  gather_facts: true

  vars:
    ansible_ssh_timeout: 300

  tasks:

    # --------------------------------------------
    # Detect package manager (clean + safe)
    # --------------------------------------------
    - name: Detect package manager
      ansible.builtin.raw: |
        if command -v apt-get >/dev/null 2>&1; then echo apt;
        elif command -v apk >/dev/null 2>&1; then echo apk;
        else echo unknown; fi
      register: pkg_mgr
      changed_when: false

    - name: Normalize package manager
      set_fact:
        pkg: "{{ pkg_mgr.stdout | trim }}"

    - name: Show detected OS type
      debug:
        msg: "Package manager detected: {{ pkg }}"

    # --------------------------------------------
    # Safety gate
    # --------------------------------------------
    - name: Fail if unsupported OS
      fail:
        msg: "Unsupported OS (only apt or apk supported)"
      when: pkg not in ['apt', 'apk']

    # ============================================
    # DEBIAN / UBUNTU PATH (SAFE + BLOCKING)
    # ============================================
    - name: Debian/Ubuntu update
      when: pkg == "apt"
      block:

        - name: Update apt cache
          apt:
            update_cache: yes
            cache_valid_time: 3600

        - name: Upgrade system (safe dist upgrade)
          apt:
            upgrade: dist
            autoremove: yes
            purge: yes

    # ============================================
    # ALPINE PATH (SAFE + BLOCKING)
    # ============================================
    - name: Alpine update
      when: pkg == "apk"
      block:

        - name: Update Alpine repositories
          raw: apk update

        - name: Upgrade Alpine system (safe blocking)
          raw: apk upgrade
