- name: Update Alpine server
  hosts: all
  become: yes

  tasks:
    - name: Update apk package index
      ansible.builtin.command: apk update
      register: apk_update
      changed_when: "'fetch' in apk_update.stdout"

    - name: List upgradable packages (before upgrade)
      ansible.builtin.command: apk list -u
      register: upgradable_before
      changed_when: false
      failed_when: false

    - name: Show upgradable packages (before)
      ansible.builtin.debug:
        msg: "{{ upgradable_before.stdout_lines | default(['No packages upgradable']) }}"

    - name: Upgrade all packages and show what's updated
      ansible.builtin.command: apk upgrade --available
      register: upgrade_output
      changed_when: >
        upgrade_output.stdout is search('Upgrading|Installing|Upgraded')
      failed_when: upgrade_output.rc not in [0, 1]

    - name: Show upgraded packages
      ansible.builtin.debug:
        msg: "{{ upgrade_output.stdout_lines | default([]) }}"
