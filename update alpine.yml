- name: Update Alpine server (manual-style output)
  hosts: all
  become: yes

  tasks:
    - name: Update apk package index
      ansible.builtin.command: apk update
      register: apk_update
      changed_when: false

    - name: Show apk update output
      ansible.builtin.debug:
        msg: "{{ apk_update.stdout_lines }}"

    - name: List upgradable packages
      ansible.builtin.command: apk list -u
      register: upgradable
      changed_when: false
      failed_when: false

    - name: Show upgradable packages
      ansible.builtin.debug:
        msg: "{{ upgradable.stdout_lines | default(['No upgradable packages']) }}"

    - name: Run full upgrade (manual output)
      ansible.builtin.command: apk upgrade --available
      register: upgrade
      changed_when: false
      failed_when: false   # IMPORTANT: don't hide output, don't fail on rc=1

    - name: Show upgrade output (raw)
      ansible.builtin.debug:
        msg: "{{ upgrade.stdout_lines }}"
